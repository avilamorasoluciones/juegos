<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rompehielo 🧊</title>
  <meta name="theme-color" content="#7c3aed" />
  <link
    rel="icon"
    href="logoam.png"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-rompehielo">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand brand-link" href="index.html">
        <span class="logo">🧊</span>
        <span class="txt"><span class="name">Avila Mora</span><small>Rompehielo</small></span>
      </a>
      <div class="topbar-actions"><button id="navToggle" type="button" class="icon-btn">☰</button></div>
    </div>
    <nav id="siteNav" class="site-nav" hidden>
      <div class="site-nav-inner">
        <a class="nav-item" href="index.html">🏠 Menú</a>
      </div>
    </nav>
  </header>

  <main id="mainContent">
    <div class="wrap">
      <section class="section active">
        <div class="stack">
          <div class="box narrow stack center">
            <h1 class="game-title">Rompehielo 🧊</h1>
            <p class="game-sub">Lee la pregunta en voz alta. Cuando todos respondan, pasa el celular y el siguiente lee la nueva pregunta. ¡Perfecto para romper el hielo!</p>
          </div>

          <div class="box narrow shell">
            <div class="stack">
              <!-- CONFIG -->
              <div id="r-scr-lobby" class="im-screen active">
                <div class="box stack compact">
                  <span class="label-muted">Preguntas a jugar</span>
                  <select id="r-selLimit">
                    <option value="20">20 Preguntas</option>
                    <option value="50">50 Preguntas</option>
                    <option value="all" selected>Todas</option>
                  </select>
                </div>
                <button type="button" class="btn primary btn-xl" id="r-btnStart">🗣️ Empezar charla</button>
              </div>

              <!-- JUEGO -->
              <div id="r-scr-game" class="im-screen center">
                <div class="box stack">
                  <div class="badge badge-cyan" id="r-catBadge">Categoría</div>
                  <h2 id="r-txtQuestion" class="prompt-main">-</h2>
                </div>
                <button type="button" class="btn primary btn-xl" id="r-btnNext">Siguiente ➡️</button>
                <button type="button" class="btn ghost" id="r-btnEnd">Terminar</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="datos.js"></script>
  <script src="scripts.js"></script>
  <script src="rompehielo.js"></script>
</body>
</html>
